<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- OG / Social meta -->
  <meta property="og:title" content="{{ page.title | default: site.title }} | {{ site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:image" content="{{ site.url }}/assets/img/ajay.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ page.title | default: site.title }}" />
  <meta name="twitter:description" content="{{ page.description | default: site.description }}" />
  <meta name="twitter:image" content="{{ site.url }}/assets/img/ajay.jpg" />

  <!-- Apply saved theme before paint to avoid flash -->
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}" />
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
      <div class="nav-right">
        <ul class="nav-links" id="nav-links">
          <li><a href="{{ '/' | relative_url }}#about">About</a></li>
          <li><a href="{{ '/' | relative_url }}#projects">Projects</a></li>
          <li><a href="{{ '/' | relative_url }}#contact">Contact</a></li>
        </ul>
        <button class="dark-toggle" id="dark-toggle" aria-label="Toggle dark mode">◐</button>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-left">© {{ site.time | date: "%Y" }} {{ site.title }}</div>
      <div class="footer-links">
        {% for item in site.social %}
          <a href="{{ item.url }}" target="_blank" rel="noopener">{{ item.label }}</a>
        {% endfor %}
      </div>
    </div>
  </footer>

  <script src="{{ '/assets/js/filters.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/ui.js' | relative_url }}" defer></script>
</body>
</html>
